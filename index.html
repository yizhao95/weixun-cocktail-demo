<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>微醺狂欢 · 试玩</title>
<style>
  :root{--bg:#16131f;--card:#241d33;--card2:#2e2542;--gold:#e8b65a;--lime:#9fe07a;--pink:#e88ab0;--mut:#9a8fb0;--txt:#f2ecff;}
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  body{margin:0;background:linear-gradient(160deg,#1a1426,#0f0c17);color:var(--txt);font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;font-size:15px;line-height:1.5}
  .wrap{max-width:520px;margin:0 auto;padding:14px 12px 60px}
  h1{font-size:20px;margin:6px 0;color:var(--gold);letter-spacing:1px}
  .sub{color:var(--mut);font-size:13px;margin-bottom:12px}
  .bar{height:16px;background:#3a2f52;border-radius:9px;overflow:hidden;margin:6px 0}
  .bar > i{display:block;height:100%;background:linear-gradient(90deg,var(--pink),var(--gold));transition:width .3s}
  .panel{background:var(--card);border:1px solid #3a3052;border-radius:12px;padding:12px;margin:10px 0}
  .row{display:flex;gap:8px;flex-wrap:wrap}
  .card{background:var(--card2);border:1px solid #43365e;border-radius:10px;padding:10px;margin:6px 0;cursor:pointer;transition:.12s}
  .card:active{transform:scale(.98)}
  .card.sel{border-color:var(--gold);background:#3a2e1f;box-shadow:0 0 0 2px var(--gold) inset}
  .card .nm{font-weight:700;font-size:15px}
  .card .meta{color:var(--mut);font-size:12.5px;margin-top:2px}
  .tag{display:inline-block;background:#43365e;border-radius:6px;padding:1px 7px;margin:2px 3px 0 0;font-size:12px;color:#d9c9ff}
  .rare{color:var(--gold)} .uncommon{color:#7ec8ff}
  .btn{display:block;width:100%;padding:13px;margin:7px 0;border:none;border-radius:11px;font-size:16px;font-weight:700;cursor:pointer;color:#1a1426;background:var(--gold)}
  .btn.alt{background:#43365e;color:var(--txt)} .btn.lime{background:var(--lime)} .btn:active{opacity:.85}
  .recipe{font-size:13px;margin:3px 0;color:var(--mut)}
  .ok{color:var(--lime)} .no{color:#c98} .done{color:var(--gold);font-weight:700}
  .big{font-size:26px;font-weight:800;color:var(--gold)}
  .center{text-align:center}
  .mini{font-size:12px;color:var(--mut)}
  select,input{background:#2e2542;color:var(--txt);border:1px solid #43365e;border-radius:8px;padding:8px;font-size:15px}
  .pill{display:inline-block;padding:2px 9px;border-radius:8px;background:#3a2f52;font-size:12px;margin-left:6px}
</style>
</head>
<body>
<div class="wrap" id="app"></div>
<script>
// ───────── 卡池(与模拟器一致) ─────────
const SPIRITS=[
 {id:"VOD",name:"伏特加",base:5,self:1.2,tags:["伏特加"]},
 {id:"RUM",name:"朗姆",base:5,self:1.2,tags:["朗姆"]},
 {id:"GIN",name:"金酒",base:5,self:1.2,tags:["金酒"]},
 {id:"TEQ",name:"龙舌兰",base:6,self:1.25,tags:["龙舌兰"]},
 {id:"WHI",name:"威士忌",base:6,self:1.3,tags:["威士忌"]}];
// 气泡系(汤力水/可乐/苏打/姜味啤酒)已移出→留给气泡水(Highball)流派
const FLAVORS=[
 ["橙汁",4,["橙汁","酸"]],["薄荷",2,["薄荷"]],["青柠",2,["青柠","酸"]],
 ["盐",1,["盐"]],["糖浆",5,["甜","糖浆"]],["苦精",2,["苦","苦精"]],
 ["蔓越莓汁",3,["蔓越莓","酸"]],["柠檬汁",3,["柠檬","酸"]],["姜汁",3,["姜"]],["椰浆",4,["椰","甜"]],
 ["桃汁",4,["桃","甜"]],["葡萄汁",4,["葡萄","甜"]],["冰",3,["冰"]],
 ["招牌糖浆",4,["甜","酸","糖浆"],"稀有"],["安格仕苦精",3,["苦","苦精"],"罕见"],
 ["接骨木",4,["甜","柠檬"],"罕见"]
].map(f=>({role:"辅料",name:f[0],base:f[1],tags:f[2],rarity:f[3]||"普通",occ:1}));
const COPY1=new Set(["橙汁","青柠","柠檬汁","蔓越莓汁"]);   // 基础果汁: 回合内首次使用→+1张临时复制
FLAVORS.forEach(f=>{if(COPY1.has(f.name))f.copy1=true;});
const ACCS=[
 ["小雨伞",1.5],["橄榄",1.3],["樱桃",1.4],["柠檬皮",1.3],["糖边",1.5],
 ["金箔",1.6,"稀有"],["烟熏",1.5,"罕见"]
].map(a=>({role:"配饰",name:a[0],mult:a[1],tags:[],rarity:a[2]||"普通",occ:0}));
const EFFS=[
 {name:"过牌",eff:"draw",n:2},{name:"续杯",eff:"draw",n:2},
 {name:"甜味检索",eff:"tutor",n:1,tag:"甜"},{name:"酸味检索",eff:"tutor",n:1,tag:"酸"},
 {name:"充分摇晃",eff:"buff",x:0.5},{name:"Mixer",eff:"mixer",choices:["橙汁","蔓越莓"],pen:0.7},
 {name:"点单·金酒",eff:"rot",to:"GIN",turns:1},{name:"点单·威士忌",eff:"rot",to:"WHI",turns:2,rarity:"罕见"},
 {name:"续单(锁轮盘)",eff:"lock",turns:2,rarity:"罕见"},{name:"对饮(双减)",eff:"dual",delay:2},
 {name:"回头客(全局)",eff:"regular",k:1,rarity:"罕见"},{name:"老主顾(全局)",eff:"regular",k:2,rarity:"稀有"},
 {name:"狂饮(过牌3)",eff:"draw",n:3,rarity:"稀有"},{name:"花式调酒",eff:"buff",x:0.5,rarity:"稀有"}
].map(e=>({role:"效果",rarity:e.rarity||"普通",occ:0,...e}));
const RECIPES=[
 ["螺丝起子","VOD",["橙汁"]],["莫斯科骡子","VOD",["姜","青柠"]],["大都会","VOD",["蔓越莓","青柠"]],
 ["海风","VOD",["蔓越莓","柠檬"]],
 ["莫吉托","RUM",["薄荷","青柠"]],["黛绮莉","RUM",["青柠","糖浆"]],
 ["椰林飘香","RUM",["椰","桃"]],
 ["内格罗尼","GIN",["苦","甜"]],["马天尼","GIN",["葡萄","冰"]],
 ["玛格丽特","TEQ",["青柠","盐"]],["龙舌兰日出","TEQ",["橙汁","蔓越莓"]],
 ["古典","WHI",["苦精","甜","冰"]]
].map(r=>({id:r[0],spirit:r[1],req:r[2]}));
const GENERIC=new Set(["酸","甜","苦","柠檬"]);   // 任意味型需求；其余tag=指定原料需求
const RAR_W={"普通":60,"罕见":30,"稀有":10};
const LADDER={1:500,2:620,3:780,4:1030,5:1260,6:1550};  // 难6基准=实测大杯流1564(2026-07-03), 其余按旧比例缩放
const BASE_SCALE=0.3, R=18, X=14, HAND=5;
const DIFF_MULT={1:4,2:12,3:24};      // 配方乘区=凑齐难度(需求味道数)：越难凑越值钱
const RARE_BONUS=0.8;                 // 配方里每用1张罕见/稀有料，整杯再 +80%
const SP_COLOR={VOD:"#8fb4ff",RUM:"#e8a86a",GIN:"#9fe07a",TEQ:"#e88ab0",WHI:"#d9a05a"};

// ───────── 双语(显示层翻译; 内部状态/CSV始终用中文名) ─────────
let LANG=(typeof localStorage!=="undefined"&&localStorage.getItem("wx_lang"))||"zh";
const EN={
 "伏特加":"Vodka","朗姆":"Rum","金酒":"Gin","龙舌兰":"Tequila","威士忌":"Whiskey",
 "橙汁":"Orange Juice","薄荷":"Mint","青柠":"Lime","盐":"Salt","糖浆":"Syrup","苦精":"Bitters",
 "蔓越莓汁":"Cranberry","柠檬汁":"Lemon Juice","姜汁":"Ginger","椰浆":"Coconut","桃汁":"Peach Juice",
 "葡萄汁":"Grape Juice","冰":"Ice","招牌糖浆":"Signature Syrup","安格仕苦精":"Angostura Bitters","接骨木":"Elderflower",
 "小雨伞":"Umbrella","橄榄":"Olive","樱桃":"Cherry","柠檬皮":"Lemon Peel","糖边":"Sugar Rim","金箔":"Gold Leaf","烟熏":"Smoke",
 "过牌":"Draw 2","续杯":"Refill (Draw 2)","甜味检索":"Sweet Tutor","酸味检索":"Sour Tutor","充分摇晃":"Shake Well",
 "Mixer":"Mixer","点单·金酒":"Order: Gin","点单·威士忌":"Order: Whiskey","续单(锁轮盘)":"Encore (Lock Wheel)",
 "对饮(双减)":"Toast (Delay Boss)","狂饮(过牌3)":"Chug (Draw 3)","花式调酒":"Flair Bartending",
 "回头客(全局)":"Regular (Global)","老主顾(全局)":"Patron (Global)",
 "螺丝起子":"Screwdriver","莫斯科骡子":"Moscow Mule","大都会":"Cosmopolitan","海风":"Sea Breeze",
 "莫吉托":"Mojito","黛绮莉":"Daiquiri","椰林飘香":"Piña Colada","内格罗尼":"Negroni","马天尼":"Martini",
 "玛格丽特":"Margarita","龙舌兰日出":"Tequila Sunrise","古典":"Old Fashioned",
 "酸":"sour","甜":"sweet","苦":"bitter","柠檬":"lemon","青柠 ":"lime","橙汁 ":"orange","蔓越莓":"cranberry",
 "姜":"ginger","椰":"coconut","桃":"peach","葡萄":"grape","冰 ":"ice","糖浆 ":"syrup","苦精 ":"bitters","盐 ":"salt","薄荷 ":"mint",
 "普通":"Common","罕见":"Uncommon","稀有":"Rare",
 "辅料":"Ingredient","配饰":"Garnish","效果":"Effect",
 "杯":"cup","手":"hand","组":"deck","缺":"none"};
function N(n){if(LANG!=="en")return n;return EN[n]||EN[n+" "]||n;}       // 卡名/配方/基酒
function Ntag(t){if(LANG!=="en")return t;return EN[t+" "]||EN[t]||t;}    // 味道tag(优先小写版)
function T(zh,en){return LANG==="en"?en:zh;}
function toggleLang(){LANG=LANG==="zh"?"en":"zh";try{localStorage.setItem("wx_lang",LANG);}catch(e){}render();}
function langBtn(){return `<span class="pill" style="cursor:pointer;float:right" onclick="toggleLang()">🌐 ${LANG==="zh"?"EN":"中文"}</span>`;}

// ───────── 工具 ─────────
function mulberry32(a){return function(){a|=0;a=a+0x6D2B79F5|0;let t=Math.imul(a^a>>>15,1|a);t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296;};}
let RNG=mulberry32(1);
const rint=n=>Math.floor(RNG()*n);
function shuffle(a){for(let i=a.length-1;i>0;i--){const j=rint(i+1);[a[i],a[j]]=[a[j],a[i]];}return a;}
function sample(arr,k){const c=arr.slice();shuffle(c);return c.slice(0,k);}
function wrar(){let r=RNG()*100,u=0;for(const t in RAR_W){u+=RAR_W[t];if(r<=u)return t;}return"普通";}
function recipesUsing(tag){return RECIPES.filter(r=>r.req.includes(tag)).map(r=>r.id);}
function rarCls(c){return c.rarity==="稀有"?"rare":c.rarity==="罕见"?"uncommon":"";}

function describe(c){
  const rar=c.rarity!=="普通"?" 〔"+N(c.rarity)+"〕":"";
  if(c.role==="辅料"){const rs=[...new Set(c.tags.flatMap(recipesUsing))].map(id=>{const r=RECIPES.find(x=>x.id===id);return N(id)+'<span class="mini">×'+DIFF_MULT[r.req.length]+'</span>';});
    return `<div class="nm ${rarCls(c)}">🧉 ${N(c.name)}${rar} <span class="mini">${T("占位","slots ")}${c.occ}${c.copy1?" · ♻"+T("首用+1临时复制","1st use/turn: +1 temp copy"):""}</span></div>
    <div class="meta">${T("基础分","base ")} ${c.base} · ${c.tags.map(t=>'<span class="tag">'+Ntag(t)+'</span>').join("")}</div>
    <div class="meta">↳ ${T("可凑","recipes")}: ${rs.length?rs.slice(0,4).join("、")+(rs.length>4?"…":""):T("无配方(只给基础分)","none (base score only)")}</div>`;}
  if(c.role==="配饰")return `<div class="nm ${rarCls(c)}">🍒 ${N(c.name)}${rar} <span class="mini">${T("装饰·占位0·不可重复","garnish · 0 slots · no duplicates")}</span></div>
    <div class="meta">${T(`成配方时整杯 ×${c.mult}（独立乘区，不占杯空间，同种每杯一次）`,`On recipe: whole cup ×${c.mult} (own multiplier, no slot, once per type per cup)`)}</div>`;
  const d={draw:T(`抽牌：立刻多摸 ${c.n} 张（自动）`,`Draw ${c.n} cards immediately (auto)`),
    tutor:T(`检索：找一张带[${c.tag}]味的牌（自动）`,`Tutor: fetch a [${Ntag(c.tag)}] card from deck (auto)`),
    buff:T(`摇晃：下一杯若≥3配料，整杯 +${c.x*100|0}%（手动打出）`,`Shake: next cup with ≥3 ingredients gets +${c.x*100|0}% (play manually)`),
    mixer:T(`Mixer：变成 ${(c.choices||[]).join("/")} 之一进杯，但该杯配方×${c.pen}`,`Mixer: becomes one of ${(c.choices||[]).map(Ntag).join("/")}, but recipe ×${c.pen} this cup`),
    rot:T(`点单：接下来 ${c.turns} 回合基酒变【${(SPIRITS.find(s=>s.id===c.to)||{}).name}】（手动打出，选好时机）`,`Order: next ${c.turns} turn(s) become ${N((SPIRITS.find(s=>s.id===c.to)||{}).name)} (play manually, timing matters)`),
    lock:T(`续单：接下来 ${c.turns} 回合都是本回合的基酒（手动打出，选好时机）`,`Encore: next ${c.turns} turns repeat THIS turn's spirit (play manually)`),
    regular:T(`全局：每种基酒每做成1杯【配方酒】，该基酒之后基础分+${c.k}（线性，可与另一张叠加；打出后本局移除）`,`Global: each spirit gains +${c.k} base per RECIPE cup served of it (linear; stacks with the other copy; removed from run when played)`),
    dual:T(`对饮：Boss延后${c.delay}回合（自动）`,`Toast: Boss delayed ${c.delay} turns (auto)`)}[c.eff];
  return `<div class="nm ${rarCls(c)}">✨ ${N(c.name)}${rar}</div><div class="meta">${d}</div>`;
}

// ───────── 计分(与engine一致) ─────────
function matchedRecipe(spirit,cup){
  const have=new Set([...spirit.tags,...cup.flatMap(c=>c.tags||[])]);
  let best=null;
  for(const r of RECIPES) if(r.spirit===spirit.id && r.req.every(t=>have.has(t)))
    if(!best||r.req.length>best.req.length) best=r;
  return best;
}
function cupScore(spirit,cup,pendingBuff,penalty){
  const flav=cup.filter(c=>c.role==="辅料");
  const rb=(S&&S.regularK)?S.regularK*((S.spiritServes||{})[spirit.id]||0):0;  // 回头客: 已上杯数×k
  const base=(spirit.base+rb+flav.reduce((s,c)=>s+c.base,0))*BASE_SCALE;
  const r=matchedRecipe(spirit,cup);
  if(!r) return {score:base,aligned:false,recipe:null};
  const req=new Set(r.req), n=r.req.length;
  const rare=flav.filter(c=>(c.rarity==="罕见"||c.rarity==="稀有")&&c.tags.some(t=>req.has(t))).length;
  let mult=spirit.self*(DIFF_MULT[n]||DIFF_MULT[3])*(1+RARE_BONUS*rare)*penalty;
  const seen=new Set();
  for(const c of cup) if(c.role==="配饰"&&!seen.has(c.name)){seen.add(c.name);mult*=c.mult;}
  if(pendingBuff&&flav.length>=3) mult*=(1+pendingBuff);
  return {score:base*mult,aligned:true,recipe:r.id};
}

// ───────── 状态 ─────────
let S={};
function start(diff,seed){
  RNG=mulberry32(40000+seed);
  S={phase:"draft",diff,seed,target:LADDER[diff],round:1,
     deck:FLAVORS.slice(0,5).map(c=>({...c})),offer:null,
     // battle填充
  };
  genOffer(); render();
}
function genOffer(){
  const tier=wrar();
  const pool=[...FLAVORS,...ACCS,...EFFS].filter(c=>c.rarity===tier);
  S.offer={tier,cards:sample(pool,Math.min(3,pool.length)).map(c=>({...c}))};
}
function pick(i){
  if(i>=0) S.deck.push({...S.offer.cards[i]});
  S.round++;
  if(S.round>R){beginBattle();return;}
  genOffer(); render();
}

// 战斗
function beginBattle(){
  RNG=mulberry32(S.seed);
  S.phase="battle"; S.turn=1; S.revelry=0; S.cup=[]; S.penalty=1; S.buff=0;
  S.rotMap={}; S.bossDelay=0; S.serves=[]; S.saved=false;
  S.regularK=0; S.spiritServes={}; S.copied={};
  S.draw=shuffle(S.deck.map(c=>({...c}))); S.discard=[];
  startTurn();
}
function drawN(n){const out=[];for(let k=0;k<n;k++){if(!S.draw.length){if(!S.discard.length)break;S.draw=shuffle(S.discard);S.discard=[];}out.push(S.draw.pop());}return out;}
function effSpirit(t){const f=S.rotMap[t];if(f)return SPIRITS.find(s=>s.id===f)||SPIRITS[(t-1)%5];return SPIRITS[(t-1)%5];}
function startTurn(){
  // 队列式处理：被过牌/检索抽出来的效果牌同样会连锁触发
  // 已触发的效果卡先押暂存区、连锁结束才进弃牌堆——否则洗牌会把它们抽回来无限循环(2026-07-21修复)
  let queue=drawN(HAND), rest=[], log=[], usedFx=[];
  while(queue.length){
    const c=queue.shift();
    if(c.role==="效果"&&["draw","tutor","dual"].includes(c.eff)){
      if(c.eff==="draw"){queue.push(...drawN(c.n));log.push(T(`过牌+${c.n}`,`Draw +${c.n}`));}
      else if(c.eff==="tutor"){const idx=S.draw.findIndex(x=>x.tags&&x.tags.includes(c.tag));if(idx>=0){queue.push(S.draw.splice(idx,1)[0]);log.push(T(`检索→拿到${c.tag}`,`Tutor→got ${Ntag(c.tag)}`));}else log.push(T(`检索${c.tag}:牌库没有`,`Tutor ${Ntag(c.tag)}: none in deck`));}
      else if(c.eff==="dual"){S.bossDelay+=c.delay;log.push(T(`Boss延后${c.delay}`,`Boss delayed ${c.delay}`));}
      usedFx.push(c);
    } else rest.push(c); // 辅料/配饰/mixer/buff/rot/lock 留在手里(改轮盘类一律手动)
  }
  S.discard.push(...usedFx);
  S.hand=rest; S.sel=new Set(); S.autolog=log; S.spirit=effSpirit(S.turn); S.feedback=""; S.wheelSel=null; S.copied={};
  render();
}
function toggle(i){if(S.sel.has(i))S.sel.delete(i);else S.sel.add(i);render();}
function curAdds(){return [...S.sel].map(i=>S.hand[i]);}
function previewFlavors(){
  const fl=[]; let pen=S.penalty, buff=S.buff;
  for(const c of curAdds()){
    if(c.role==="效果"&&c.eff==="mixer"){fl.push({role:"辅料",base:2,tags:[c.choices[0]],name:"Mixer"});pen*=c.pen;}
    else if(c.role==="效果"&&c.eff==="buff"){buff=c.x;}
    else fl.push(c);
  }
  return {flavors:[...S.cup,...fl],pen,buff};
}
const CAP=4;                          // 杯总占位上限(基酒占1 + 各料占位)，即最多3份配料；装饰占0
function cupOcc(){return 1 + S.cup.reduce((s,c)=>s+(c.occ||0),0);}  // 基酒占1
function mixerChoice(c){
  const have=new Set([...S.spirit.tags,...S.cup.flatMap(x=>x.tags||[])]);
  const need=new Set();
  for(const r of RECIPES) if(r.spirit===S.spirit.id) r.req.forEach(t=>{if(!have.has(t))need.add(t);});
  for(const ch of c.choices) if(need.has(ch)) return ch;
  return c.choices[0];
}
function playSelected(){
  if(!S.sel.size){S.feedback=T("（先点选手牌再打出）","(select cards first, then play)");render();return;}
  // 材料入杯=手牌立刻进弃牌堆，杯中留镜像(mirror)；临时复制牌(temp)用掉即消失不进弃牌堆
  const msg=[], played=new Set(), toDiscard=[];
  for(const i of [...S.sel].sort((a,b)=>a-b)){
    const c=S.hand[i];
    if(c.role==="辅料"){
      const occ=c.occ||1;
      if(cupOcc()+occ>CAP){msg.push(T(`✗ ${c.name}：杯占位已满(${CAP})`,`✗ ${N(c.name)}: cup slots full (${CAP})`));continue;}
      S.cup.push({...c,mirror:true});played.add(i);
      if(!c.temp)toDiscard.push(c);
      msg.push(`+${N(c.name)}${c.temp?T("(临时)","(temp)"):""}`);
      if(c.copy1&&!c.temp&&!S.copied[c.name]){S.copied[c.name]=1;S.hand.push({...c,temp:true});msg.push(T(`♻复制1张临时${c.name}`,`♻ +1 temp ${N(c.name)}`));}
    }else if(c.role==="配饰"){
      if(S.cup.some(x=>x.role==="配饰"&&x.name===c.name)){msg.push(T(`⚠ ${c.name} 重复·无效(同种每杯一次)`,`⚠ ${N(c.name)} duplicate · wasted (one per type per cup)`));played.add(i);toDiscard.push(c);continue;}
      S.cup.push({...c,mirror:true});played.add(i);toDiscard.push(c);msg.push(`+${N(c.name)}${T(`(装饰×${c.mult}·不占位)`,`(garnish ×${c.mult}, no slot)`)}`);
    }else if(c.eff==="mixer"){
      if(cupOcc()+1>CAP){msg.push(T("✗ Mixer：杯占位已满","✗ Mixer: cup slots full"));continue;}
      const ch=mixerChoice(c);S.cup.push({role:"辅料",occ:1,base:2,tags:[ch],name:"Mixer→"+ch,synth:true});S.penalty*=c.pen;played.add(i);toDiscard.push(c);msg.push(`+Mixer→${Ntag(ch)}${T(`(本杯配方×${c.pen})`,`(recipe ×${c.pen} this cup)`)}`);
    }else if(c.eff==="buff"){S.buff=c.x;played.add(i);toDiscard.push(c);msg.push(T(`🫨摇晃就绪(下次上酒满3料 +${c.x*100|0}%)`,`🫨 Shake ready (next serve with ≥3 ingredients: +${c.x*100|0}%)`));}
    else if(c.eff==="lock"){
      for(let t=S.turn+1;t<=S.turn+c.turns;t++)S.rotMap[t]=S.spirit.id;
      played.add(i);toDiscard.push(c);msg.push(T(`📌续单：第${S.turn+1}~${S.turn+c.turns}回合锁定【${S.spirit.name}】`,`📌 Encore: turns ${S.turn+1}–${S.turn+c.turns} locked to ${N(S.spirit.name)}`));
    }else if(c.eff==="rot"){
      const to=(SPIRITS.find(s=>s.id===c.to)||{}).name;
      for(let t=S.turn+1;t<=S.turn+c.turns;t++)S.rotMap[t]=c.to;
      played.add(i);toDiscard.push(c);msg.push(T(`📌点单：第${S.turn+1}${c.turns>1?"~"+(S.turn+c.turns):""}回合变【${to}】`,`📌 Order: turn ${S.turn+1}${c.turns>1?"–"+(S.turn+c.turns):""} becomes ${N(to)}`));
    }else if(c.eff==="regular"){
      // 全局卡打出后本局移除(exile, 不进弃牌堆)——防单卡洗牌循环复叠(2026-07-21拍板)
      S.regularK=(S.regularK||0)+c.k;
      played.add(i);msg.push(T(`🔁全局生效(本局移除)：每种基酒每做成1杯配方酒→之后基础分+${c.k}（当前累计+${S.regularK}/杯）`,`🔁 Global (removed from this run): each spirit gains +${c.k} base per RECIPE cup served of it (now +${S.regularK}/cup)`));
    }
  }
  for(const c of toDiscard) S.discard.push(c);
  S.hand=S.hand.filter((_,i)=>!played.has(i));
  S.sel=new Set();
  const r=matchedRecipe(S.spirit,S.cup);
  if(r) msg.push(T(`★成配方 ${r.id}！`,`★ Recipe complete: ${N(r.id)}!`));
  S.feedback=msg.join(" · ")||T("（无可打出）","(nothing playable)");
  render();
}
function discardHand(){for(const c of S.hand) if(!c.temp) S.discard.push(c); S.hand=[];}  // 临时牌消失不进弃牌堆
function serveCup(){
  // 上酒=结算这杯并清杯，回合不推进；同一回合可反复攒杯再上(基酒都是本回合的)
  // 空杯禁上: 否则"无限空杯serve+回头客"可无限刷分(LLM对局实测漏洞 2026-07-07)
  if(!S.cup.some(c=>c.role==="辅料")){S.feedback=T("✗ 空杯不能上酒（杯里至少要有1份辅料）","✗ Can't serve an empty cup (needs ≥1 ingredient)");render();return;}
  const r=cupScore(S.spirit,S.cup,S.buff,S.penalty);
  S.serves.push({turn:S.turn,spirit:S.spirit.name,recipe:r.recipe||"-",score:Math.round(r.score)});
  S.revelry+=r.score;
  if(r.aligned)S.spiritServes[S.spirit.id]=(S.spiritServes[S.spirit.id]||0)+1;   // 回头客只计成方杯(散杯刷计数漏洞修复 2026-07-21)
  S.cup=[];S.penalty=1;S.buff=0;                                    // 杯中全是镜像，直接清空
  if(S.revelry>=S.target){S.phase="result";S.win=S.turn<=(X+S.bossDelay);S.toTurn=S.turn;saveRun();render();return;}
  S.feedback=T(`🍸 上酒 ${Math.round(r.score)}分 ${r.aligned?"(成"+r.recipe+")":"(未成方·小加法)"}——本回合还可继续攒杯再上（基酒仍是${S.spirit.name}）`,
    `🍸 Served for ${Math.round(r.score)} ${r.aligned?"("+N(r.recipe)+"!)":"(no recipe · tiny score)"} — you may build & serve again this turn (spirit is still ${N(S.spirit.name)})`);
  render();
}
function endTurn(){ discardHand(); endOrNext(); }
function endOrNext(){
  if(S.revelry>=S.target){S.phase="result";S.win=S.turn<=(X+S.bossDelay);S.toTurn=S.turn;saveRun();render();return;}
  S.turn++;
  if(S.turn>X){S.phase="result";S.win=false;S.toTurn=null;saveRun();render();return;}
  startTurn();
}

function saveRun(){
  if(S.saved) return; S.saved=true;
  const rec={ts:new Date().toISOString(),seed:S.seed,diff:S.diff,target:S.target,
    revelry:Math.round(S.revelry),win:S.win?1:0,toTurn:S.toTurn||"",deckSize:S.deck.length,
    deck:S.deck.map(c=>c.name).join("|"),
    serves:S.serves.map(s=>`${s.turn}@${s.spirit}:${s.recipe}=${s.score}`).join(" ")};
  const all=JSON.parse(localStorage.getItem("wx_runs")||"[]"); all.push(rec);
  localStorage.setItem("wx_runs",JSON.stringify(all));
}
function runCount(){return JSON.parse(localStorage.getItem("wx_runs")||"[]").length;}
function exportCSV(){
  const all=JSON.parse(localStorage.getItem("wx_runs")||"[]");
  if(!all.length){alert("还没有记录");return;}
  const cols=["ts","seed","diff","target","revelry","win","toTurn","deckSize","deck","serves"];
  let csv=cols.join(",")+"\n";
  for(const r of all) csv+=cols.map(k=>`"${String(r[k]??"").replace(/"/g,'""')}"`).join(",")+"\n";

  a.href=URL.createObjectURL(new Blob([csv],{type:"text/csv"}));

}

// ───────── 轮盘可视化 & 引导 ─────────
function sectorPath(cx,cy,r,a0,a1){
  const x0=cx+r*Math.cos(a0),y0=cy+r*Math.sin(a0),x1=cx+r*Math.cos(a1),y1=cy+r*Math.sin(a1);
  return `M${cx},${cy} L${x0.toFixed(1)},${y0.toFixed(1)} A${r},${r} 0 0 1 ${x1.toFixed(1)},${y1.toFixed(1)} Z`;
}
function wheelSVG(){
  const idx=SPIRITS.findIndex(s=>s.id===S.spirit.id), rot=-idx*72, D=Math.PI/180;
  let sec="";
  for(let i=0;i<5;i++){
    const mid=(i*72-90)*D, sp=SPIRITS[i], cur=i===idx;
    sec+=`<path d="${sectorPath(60,68,52,mid-36*D,mid+36*D)}" fill="${SP_COLOR[sp.id]}" opacity="${cur?1:.35}" stroke="#16131f" stroke-width="2" style="cursor:pointer" onclick="wheelInfo('${sp.id}')"/>`;
    const tx=60+34*Math.cos(mid), ty=68+34*Math.sin(mid);
    sec+=`<text x="${tx.toFixed(1)}" y="${ty.toFixed(1)}" font-size="10.5" fill="#16131f" font-weight="700" text-anchor="middle" dominant-baseline="middle" transform="rotate(${-rot} ${tx.toFixed(1)} ${ty.toFixed(1)})" pointer-events="none">${LANG==="en"?N(sp.name).slice(0,3):sp.name}</text>`;
  }
  return `<svg width="120" height="130" viewBox="0 0 120 130" style="flex:none">
   <polygon points="53,2 67,2 60,15" fill="var(--gold)"/>
   <g style="transform-origin:60px 68px;transform:rotate(${rot}deg);transition:transform .6s ease">${sec}</g>
   <circle cx="60" cy="68" r="11" fill="#241d33" stroke="var(--gold)" stroke-width="2"/>
  </svg>`;
}
function wheelInfo(id){ S.wheelSel=(S.wheelSel===id)?null:id; render(); }
function turnsFor(id){const ts=[];for(let t=S.turn;t<=X;t++)if(effSpirit(t).id===id)ts.push(t);return ts;}
function reqLabel(t){return GENERIC.has(t)?T("任意"+t,"any "+Ntag(t)):Ntag(t);}
function cupTags(){return new Set([...S.spirit.tags,...S.cup.flatMap(c=>c.tags||[])]);}
function reqMark(t,forCurrent){                    // 该需求现在哪：杯/手/组/缺
  if(forCurrent&&cupTags().has(t))return["杯","done"];
  if(S.hand.some(c=>(c.tags||[]).includes(t)))return["手","ok"];
  if(S.draw.concat(S.discard).some(c=>(c.tags||[]).includes(t)))return["组",""];
  return["缺","no"];
}
function spiritRecipesHTML(sp,forCurrent){
  return RECIPES.filter(r=>r.spirit===sp.id).map(r=>{
    const done=forCurrent&&r.req.every(t=>cupTags().has(t));
    const marks=r.req.map(t=>{const[m,cls]=reqMark(t,forCurrent);return `<span class="${cls}">${reqLabel(t)}·${N(m)}</span>`;}).join("　");
    return `<div class="recipe">${done?`<span class="done">★${T("成!","DONE! ")}</span>`:''}${N(r.id)}<span class="mini">×${DIFF_MULT[r.req.length]}</span>: ${marks}</div>`;
  }).join("")||`<div class="recipe mini">${T("（该基酒暂无配方）","(no recipes for this spirit)")}</div>`;
}
function turnStrip(){
  let h="";
  for(let t=S.turn;t<=X;t++){const sp=effSpirit(t);
    h+=`<span title="turn ${t}" style="display:inline-block;width:21px;height:21px;line-height:21px;text-align:center;border-radius:50%;font-size:11px;color:#16131f;font-weight:700;background:${SP_COLOR[sp.id]};margin:1px;${t===S.turn?'box-shadow:0 0 0 2px var(--gold)':'opacity:.5'}">${N(sp.name)[0]}</span>`;}
  return h;
}
function hintLine(){
  const cupNow=cupScore(S.spirit,S.cup,S.buff,S.penalty);
  const have=new Set([...S.spirit.tags,...S.cup.flatMap(c=>c.tags||[])]);
  const handFl=S.hand.filter(c=>c.role==="辅料");
  let best=null;
  for(const r of RECIPES.filter(r=>r.spirit===S.spirit.id)){
    const miss=r.req.filter(t=>!have.has(t));
    if(!miss.length) continue;
    const used=new Set(), cards=[]; let ok=true;
    for(const t of miss){
      const j=handFl.findIndex((c,k)=>!used.has(k)&&(c.tags||[]).includes(t));
      if(j<0){ok=false;break;} used.add(j); cards.push(handFl[j]);
    }
    if(!ok) continue;
    if(cupOcc()+cards.reduce((s,c)=>s+(c.occ||1),0)>CAP) continue;
    if(!best||DIFF_MULT[r.req.length]>DIFF_MULT[best.r.req.length]) best={r,cards};
  }
  if(best) return T(`💡 打出「${best.cards.map(c=>c.name).join("、")}」即成 ${best.r.id}(×${DIFF_MULT[best.r.req.length]})`,
    `💡 Play [${best.cards.map(c=>N(c.name)).join(", ")}] to complete ${N(best.r.id)} (×${DIFF_MULT[best.r.req.length]})`);
  if(cupNow.aligned) return T(`💡 已成 ${cupNow.recipe}——现在上酒得 ${Math.round(cupNow.score)} 分；也可再加料/装饰抬分后再上`,
    `💡 ${N(cupNow.recipe)} complete — serve now for ${Math.round(cupNow.score)}, or add fillers/garnish first`);
  return T("💡 本杯手牌凑不成配方：可上酒拿小加法，或结束回合留杯等好料",
    "💡 No recipe possible with this hand: serve for a tiny score, or end turn and bank the cup");
}
function rotPreview(c){   // 点单/续单: 打出前预览未来基酒会变成什么
  if(S.phase!=="battle"||(c.eff!=="rot"&&c.eff!=="lock"))return "";
  const to=c.eff==="lock"?S.spirit:SPIRITS.find(s=>s.id===c.to);
  const rows=[];
  for(let t=S.turn+1;t<=Math.min(S.turn+c.turns,X);t++)rows.push(`${T("第"+t+"回合","turn "+t)} ${N(effSpirit(t).name)}→<b style="color:${SP_COLOR[to.id]}">${N(to.name)}</b>`);
  return rows.length?`<div class="meta" style="color:var(--gold)">🔮 ${T("现在打出：","If played now: ")}${rows.join(T("，",", "))}</div>`:"";
}
function deckRecipes(){
  const tags=new Set(S.deck.flatMap(c=>c.tags||[]));
  return RECIPES.filter(r=>r.req.every(t=>tags.has(t)));
}

    </div>
   </div>
   ${wsp&&wsp.id!==sp.id?`<div style="margin-top:6px;border:1px dashed ${SP_COLOR[wsp.id]};border-radius:8px;padding:6px 8px">🔭 <b style="color:${SP_COLOR[wsp.id]}">${N(wsp.name)}</b> <span class="mini">${wts.length?T("第 "+wts.join("、")+" 回合轮到","turns "+wts.join(", ")):T("剩余回合不再轮到","no more turns this game")}</span>${T(" 的配方："," recipes:")}${spiritRecipesHTML(wsp,false)}</div>`:(wsp?`<div class="mini" style="color:var(--gold);margin-top:4px">📍${T(wsp.name+"就是本回合基酒，配方见下方",N(wsp.name)+" is this turn's spirit — recipes below")}</div>`:"")}
   <div style="margin-top:8px">📖 ${N(sp.name)}${T("配方（×越大越难凑越值钱）："," recipes (bigger × = harder = richer):")}</div>${recs}
   <div class="mini">${T("标记：","Marks: ")}<span class="done">${T("杯","cup")}</span>=${T("已入杯(含基酒自带)","in cup (incl. spirit)")}　<span class="ok">${T("手","hand")}</span>=${T("在手牌","in hand")}　${T("组","deck")}=${T("在牌组未到手","in deck, not drawn")}　<span class="no">${T("缺","none")}</span>=${T("牌组没有","not in deck")}　${T("「任意X」=该味型任何原料都行，其余必须指定原料","“any X” = any card of that flavor; others need the exact ingredient")}</div>
   <div style="margin-top:6px">🥃 ${T("杯中","Cup")} <span class="mini">(${T("占位","slots")} ${cupOcc()}/${CAP})</span>: ${S.cup.length?S.cup.map(c=>N(c.name)+(c.role==="配饰"?T("·装饰","·garnish"):"")).join("、")+` → ${T("上酒得","serve for")} <b>${Math.round(cupNow.score)}</b>${cupNow.aligned?'('+N(cupNow.recipe)+'!)':T('(未成方·小加法)','(no recipe · tiny score)')}`:T("空","empty")}${S.buff?` <span class="pill">🫨${T("摇晃待发","Shake ready")}</span>`:""}${S.regularK?` <span class="pill">🔁+${S.regularK}/${T("杯","cup")} ${SPIRITS.map(s=>(S.spiritServes[s.id]||0)?N(s.name)[0]+"×"+S.spiritServes[s.id]:"").filter(Boolean).join(" ")}</span>`:""}</div>
   <div class="mini" style="margin-top:5px;color:var(--lime)">${hintLine()}</div>
  </div>
  <div class="sub">✋ ${T("手牌（点选 → 打出入杯）：","Hand (tap to select → play):")}</div>
  ${S.hand.length?S.hand.map((c,i)=>`<div class="card ${S.sel.has(i)?'sel':''}" onclick="toggle(${i})">${describe(c)}${c.temp?`<div class="meta" style="color:var(--gold)">⏳${T("临时复制·回合结束消失","temp copy · vanishes at end of turn")}</div>`:''}${rotPreview(c)}</div>`).join(""):`<div class="mini">${T("手牌已空","hand empty")}</div>`}
  <button class="btn" onclick="playSelected()">▶ ${T("打出选中入杯","Play selected")}</button>
  <button class="btn lime" onclick="serveCup()">🍸 ${T("上酒结算","Serve")} +${Math.round(cupNow.score)}${T("分（本回合可多次上酒）"," (multiple serves per turn OK)")}</button>
  <button class="btn alt" onclick="endTurn()">⏭ ${T("结束回合（不上酒则留杯）","End turn (unserved cup is banked)")}</button>`;
}
function draftExtra(c){
  if(c.role!=="辅料") return "";
  const rs=[...new Set(c.tags.flatMap(recipesUsing))].map(id=>RECIPES.find(r=>r.id===id)).slice(0,5);
  if(!rs.length) return "";
  return '<div class="meta" style="margin-top:4px;border-top:1px dashed #43365e;padding-top:4px">'+rs.map(r=>{
    const cnt=t=>S.deck.filter(x=>(x.tags||[]).includes(t)).length;
    const filled=r.req.filter(t=>cnt(t)>0).length;
    const willDo=c.tags.some(t=>r.req.includes(t)&&cnt(t)===0)&&filled===r.req.length-1;
    const det=r.req.map(t=>{const n=cnt(t);return n>0?'<span class="ok">✓'+reqLabel(t)+(n>1?"×"+n:"")+'</span>':'<span class="no">✗'+reqLabel(t)+'</span>';}).join(" ");
    return `${N(r.id)}<span class="mini">×${DIFF_MULT[r.req.length]}</span> <b>${filled}/${r.req.length}</b>${willDo?` <span class="done">${T("→选它可成!","→ completes it!")}</span>`:''} ${det}`;
  }).join("<br>")+'</div>';
}
function renderResult(){
  app.innerHTML=`<h1>${T("结算","Results")} ${langBtn()}</h1>
  <div class="panel center">
   <div class="big">${Math.round(S.revelry)}</div><div class="mini">${T("最终狂欢值 / 难度线","final Revelry / target")} ${S.target}</div>
   <div style="margin:12px 0;font-size:20px">${S.toTurn?(S.win?T('🏆 第'+S.toTurn+'回合到线，胜！','🏆 Reached target on turn '+S.toTurn+' — WIN!'):T('第'+S.toTurn+'回合到线，惜败','Reached target on turn '+S.toTurn+' — but the Boss was faster')):T('✗ 14回合内未到线，败','✗ Failed to reach target in 14 turns')}</div>
  </div>
  <div class="panel mini"><b>${T("本局每杯：","Serves: ")}</b>${S.serves.length?S.serves.map(s=>`${T("第"+s.turn+"回合","T"+s.turn)} ${N(s.spirit)}·${s.recipe==="-"?"-":N(s.recipe)} <b>${s.score}</b>`).join("　/　"):T("未上酒","none")}<br><b>${T("牌组：","Deck: ")}</b>${S.deck.map(c=>N(c.name)).join("、")}</div>
  <button class="btn lime" onclick="start(${S.diff},${S.seed})">🔁 ${T("重打同种子","Replay same seed")}(${S.seed})</button>
  <button class="btn" onclick="S.phase='setup';render()">${T("再来一局(换种子/难度)","New game (new seed/difficulty)")}</button>
  <div class="panel">
   <div class="mini">${T("已记录","Recorded")} <b>${runCount()}</b> ${T("局（存在本机浏览器）","runs (stored in this browser)")}</div>
   <button class="btn alt" onclick="exportCSV()">⬇ ${T("导出全部数据 CSV","Export all data (CSV)")}</button>
   <button class="btn alt" onclick="clearRuns()">${T("清空记录","Clear records")}</button>
  </div>`;
}
S.phase="setup"; render();
</script>
</body>
